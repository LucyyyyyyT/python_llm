name: Coverage

on:
  push:
    branches: ['*']

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest coverage

      - name: Run tests and collect coverage
        run: |
          coverage run -m pytest --doctest-modules python_llm/ && coverage report -m

          COVERAGE_PERCENT=$(coverage report | tail -1 | awk '{print $NF}' | sed 's/%//')
          if [ "$COVERAGE_PERCENT" -ge 90 ]; then
            COLOR="brightgreen"
          else
            COLOR="red"
          fi
          BADGE="![Coverage](https://img.shields.io/badge/coverage-${COVERAGE_PERCENT}%25-${COLOR})"
          sed -i "s|!\[Coverage\](https://img.shields.io/badge/coverage-.*)|$BADGE|" README.md

      - name: Commit badge
        if: github.ref == 'refs/heads/main'
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "Update coverage badge"
          git push