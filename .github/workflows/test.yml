name: Python Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest  # VM to run your workflow

    env:
      # Load your GitHub secret into an environment variable
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

    steps:
      # 1️⃣ Checkout your repo
      - uses: actions/checkout@v3

      # 2️⃣ Setup Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest coverage codecov

      # 4️⃣ Run tests with coverage
      - name: Run tests and collect coverage
        run: |
          pip install pytest pytest-cov
          pytest --cov=python_llm --cov-branch --cov-report=xml

      # 5️⃣ Upload to Codecov
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml