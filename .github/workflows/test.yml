name: Python Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest coverage

      - name: Run tests and collect coverage
        run: |
          coverage run -m pytest --doctest-modules python_llm/ && coverage report -m
          COVERAGE_PERCENT=$(coverage report | tail -1 | awk '{print $NF}' | sed 's/%//')
          echo "COVERAGE_PERCENT=$COVERAGE_PERCENT" >> $GITHUB_ENV
          if [ "$COVERAGE_PERCENT" -ge 90 ]; then
            echo "COVERAGE_STATUS=passed" >> $GITHUB_ENV
            echo "COVERAGE_COLOR=brightgreen" >> $GITHUB_ENV
          else
            echo "COVERAGE_STATUS=failed" >> $GITHUB_ENV
            echo "COVERAGE_COLOR=red" >> $GITHUB_ENV
          fi

      - name: Create coverage badge
        run: |
          echo "https://img.shields.io/badge/coverage-${{ env.COVERAGE_PERCENT }}%25-${{ env.COVERAGE_COLOR }}" > badge_url.txt
          cat badge_url.txt

      - name: Upload badge URL as artifact
        uses: actions/upload-artifact@v3
        with:
          name: coverage-badge
          path: badge_url.txt