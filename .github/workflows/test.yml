name: coverage

on:
  push:
    branches: ['project4']

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest coverage

      - name: Run tests and collect coverage
        run: |
          coverage run -m pytest --doctest-modules python_llm/ && coverage report -m
          coverage report -m
          COVERAGE_PERCENT=$(coverage report | tail -1 | awk '{print $NF}' | sed 's/%//')
          echo "Coverage: $COVERAGE_PERCENT%"
          if [ $COVERAGE_PERCENT -ge 90 ]; then
            echo "status=passed" >> $GITHUB_ENV
          else
            echo "status=failed" >> $GITHUB_ENV
          fi

      - name: Create coverage badge
        run: |
          if [ "$status" = "passed" ]; then
            COLOR="brightgreen"
          else
            COLOR="red"
          fi
          echo "https://img.shields.io/badge/coverage-$status-$COLOR" > badge_url.txt
        shell: bash